services:
  - type: web
    name: flowai
    env: node
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/flowai.sqlite
      - key: DEFAULT_COUNTRY
        value: US
      - key: EMAIL_QUEUE_DELAY_MS
        value: 2500
      - key: CORS_ORIGIN
        value: https://flowai.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
    disks:
      - name: flowai-data
        mountPath: /var/data
        sizeGB: 2
