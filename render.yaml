services:
  - type: web
    name: flowai
    env: node
buildCommand: npm install && npm install --prefix client && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/flowai.sqlite
      - key: DEFAULT_COUNTRY
        value: US
      - key: EMAIL_QUEUE_DELAY_MS
        value: 2500
      - key: CORS_ORIGIN
        value: https://flowai.onrender.com
      # Email: Gmail App Password (myaccount.google.com → Security → App Passwords)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # AI: Groq free (console.groq.com)
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      # Lead Discovery: free tiers
      - key: SERPER_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
    disks:
      - name: flowai-data
        mountPath: /var/data
        sizeGB: 2
