<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="114" fill="url(#a)"/>
  <!-- Inner subtle glow -->
  <rect width="512" height="512" rx="114" fill="url(#a)" opacity="0.3"/>
  <!-- Letter F mark - bold, clean -->
  <g fill="url(#b)" filter="url(#glow)">
    <!-- Vertical stem -->
    <rect x="136" y="128" width="72" height="256" rx="12"/>
    <!-- Top horizontal bar -->
    <rect x="136" y="128" width="240" height="68" rx="12"/>
    <!-- Middle horizontal bar -->
    <rect x="136" y="228" width="190" height="56" rx="12"/>
  </g>
</svg>
