# Optional Render Free blueprint.
# WARNING: Render Free instances do not provide persistent disks, so SQLite data may be lost on redeploy/restart.
# Use render.yaml with a persistent disk for real production persistence.
services:
  - type: web
    name: leadflow-ai-free
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/leadflow.sqlite
      - key: DEFAULT_COUNTRY
        value: US
      - key: EMAIL_QUEUE_DELAY_MS
        value: 2500
